models:
  ip_ports: "0.0.0.0:10035"
  tokenizer_path: "/home/models/Qwen3-32B"
  served_model_name: "vllm_cpu_offload"
  payload: '{"temperature":0, "max_tokens":1024, "ignore_eos":false}'
  enable_clear_hbm: false
  max_seq_length: 18500

# LLM Connection Configuration
llm_connection:
  model: "Qwen3-32B"
  server_url: "http://141.111.32.70:8244"
  tokenizer_path: "/mnt/model/Qwen3-32B"
  llm_type: "vllm"    # vllm/sglang/mindie
  enable_clear_hbm: true   # HBM clear enable, default true
  stream: true    # stream output, default true
  ignore_eos: true    # Ignore the returned terminator, default true
  timeout: 180    # request time out, default 180
  extra_info: "vllm_qwen3-32b_pc-gsa"  # extra info, Used to mark different service pull-up parameters

# Environment Pre-Check Configuration
Env_preCheck:
  master_ip: 192.168.0.1
  worker_ip:
  ascend_rt_visible_devices: ""
  node_num:
  model_path: ""
  hf_model_name: ""
  middle_page: ""
  expected_embed_bandwidth: 10
  expected_fetch_bandwidth: 10
  kvCache_block_number: 1024
  storage_backends: [""]