reports:
  base_dir: "results/reports"
  use_timestamp: false
  directory_prefix: "pytest"
  html: # pytest-html
    enabled: false
    filename: "report.html"
    title: "UCM Pytest Test Report"

results:
  - localFile: # Save the storage results to a local file. The default formats are jsonl and csv.
      path: "./results"
